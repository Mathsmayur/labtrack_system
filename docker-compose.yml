version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mylab_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Mayur@123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-labtrack}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./mylab-backend
      dockerfile: Dockerfile
    container_name: mylab_backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE:-labtrack}?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-Mayur@123}
      - JWT_SECRET=${JWT_SECRET:-MySecretKeyForJWTTokenGeneration12345678901234567890}
      - SERVER_PORT=8081
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./mylab-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8081/api}
    container_name: mylab_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
